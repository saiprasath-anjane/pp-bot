services:
  db:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql

  qdrant:
    image: qdrant/qdrant
    restart: always
    ports:
      - 6333:6333
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  qdrantdata: